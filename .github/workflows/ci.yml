name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - otp: "28.0"
            elixir: "1.19"
            experimental: false
          - otp: "28.0"
            elixir: "1.20.0-rc.2"
            experimental: true

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pyex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/pyex_test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        id: compile
        continue-on-error: ${{ matrix.experimental }}
        run: mix compile --warnings-as-errors

      - name: Run tests
        id: test
        if: ${{ !matrix.experimental || steps.compile.outcome == 'success' }}
        continue-on-error: ${{ matrix.experimental }}
        run: mix test --include postgres

      - name: Report experimental failure
        if: ${{ always() && matrix.experimental && (steps.compile.outcome == 'failure' || steps.test.outcome == 'failure') }}
        run: |
          echo "Experimental Elixir ${{ matrix.elixir }} run failed, likely due to upstream dependency compatibility."
          echo "Compile outcome: ${{ steps.compile.outcome }}"
          echo "Test outcome: ${{ steps.test.outcome }}"

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-28.0-1.19-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-28.0-1.19-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-28.0-1.19-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-28.0-1.19-

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: _build/dev/*.plt*
          key: plt-${{ runner.os }}-28.0-1.19-${{ hashFiles('**/mix.lock') }}
          restore-keys: plt-${{ runner.os }}-28.0-1.19-

      - name: Install dependencies
        run: mix deps.get

      - name: Run Dialyzer
        run: mix dialyzer

  external-http:
    name: External HTTP Integration (OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - otp: "28.0"
            elixir: "1.19"
            experimental: false
          - otp: "28.0"
            elixir: "1.20.0-rc.2"
            experimental: true

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Run external HTTP integration tests
        id: external_http
        continue-on-error: ${{ matrix.experimental }}
        run: mix test --include external_http test/pyex/stdlib/requests_integration_test.exs

      - name: Report experimental failure
        if: ${{ always() && matrix.experimental && steps.external_http.outcome == 'failure' }}
        run: |
          echo "Experimental Elixir ${{ matrix.elixir }} external HTTP run failed, likely due to upstream dependency compatibility."
          echo "Test outcome: ${{ steps.external_http.outcome }}"
